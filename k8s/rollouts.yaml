        - name: REDIS_PORT
          value: "6379"
        - name: USER_SERVICE_URL
          value: "http://user-service:3001"
        - name: EMAIL_PROVIDER
          value: "ses"
        - name: SES_FROM_EMAIL
          value: "kongalaraghu406@gmail.com"
